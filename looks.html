<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Z&R - Outfits</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
  <link rel="preload" href="styles.css" as="style">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-aeromexico">
  <div id="global-loader" class="global-loader hidden">
    <div class="loader-spinner"></div>
    <div class="loader-text">Cargando...</div>
  </div>

  <header class="app-header">
    <div class="header-left">
      <div class="logo-touch-area" id="secret-logo">
        <span class="logo-mark">Z&R</span>
      </div>
      <div class="header-text">
        <h1 class="app-title">Outfits</h1>
        <p class="app-subtitle">Descubre Combinaciones</p>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-button" id="layout-toggle-looks" aria-label="Cambiar layout">📱</button>
      <button class="icon-button" id="refresh-looks" aria-label="Actualizar">⟳</button>
    </div>
  </header>

  <div class="looks-nav">
    <a href="index.html" style="background:#ff4f81; color:white;">Catalogo</a>
  </div>

    <div class="looks-grid" id="looks-container"></div>

  <button class="floating-cart" id="floating-cart-btn" aria-label="Ver carrito">
    <span class="cart-icon">🛒</span>
    <span class="cart-badge" id="cart-count">0</span>
  </button>

  <aside class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-header">
      <h2>Tu carrito</h2>
      <button class="icon-button" id="close-cart-btn" aria-label="Cerrar carrito">✕</button>
    </div>
    <div class="cart-body" id="cart-items-container"></div>
    <div class="cart-footer">
      <div class="cart-summary-row">
        <span>Subtotal</span>
        <span id="cart-subtotal">$0</span>
      </div>
      <div class="cart-summary-row total">
        <span>Total</span>
        <span id="cart-total">$0</span>
      </div>
      <div id="saved-phone-container" style="font-size: 11px; text-align: center; margin: 8px 0; color: #666; display: none;">
        📱 Número guardado: <span id="saved-phone-display"></span>
        <button id="change-phone-btn" style="background: none; border: none; color: #ff4f81; cursor: pointer; text-decoration: underline; margin-left: 5px;">Cambiar</button>
      </div>
      <button id="request-purchase-btn" class="primary-button full-width" style="background: linear-gradient(135deg, #25D366, #128C7E); margin-top: 8px;">
        📝 Solicitar compra
      </button>
    </div>
  </aside>

  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <div class="image-modal" id="image-modal" aria-hidden="true">
    <button class="icon-button close-image-modal" id="close-image-modal">✕</button>
    <img id="image-modal-img" alt="Vista de producto" />
  </div>

     <script src="common.js" defer></script>
  <script src="looks.js" defer></script>
  <script src="cache-manager.js" defer></script>
  <script>
    // Este script NO tiene defer - debe ejecutarse rápido para registrar el SW
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/ZNR/sw.js')
          .then(registration => console.log('✅ SW registrado:', registration.scope))
          .catch(error => console.log('❌ Error SW:', error));
      });
    }
  </script>

  <script defer>
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 Inicializando página con modales personalizados...');
        
        window.changePhoneNumber = changePhoneNumber;
        window.updateSavedPhoneDisplay = updateSavedPhoneDisplay;
        window.openCartDrawer = openCartDrawer;
        window.closeCartDrawer = closeCartDrawer;
        window.renderCart = renderCart;
        window.addToCart = addToCart;
        
        const floatingCartBtn = document.getElementById('floating-cart-btn');
        if (floatingCartBtn) {
            const newBtn = floatingCartBtn.cloneNode(true);
            floatingCartBtn.parentNode.replaceChild(newBtn, floatingCartBtn);
            newBtn.addEventListener('click', () => {
                console.log('🛒 Abriendo carrito');
                if (typeof window.openCartDrawer === 'function') {
                    window.openCartDrawer();
                }
            });
        }
        
        const closeCartBtn = document.getElementById('close-cart-btn');
        if (closeCartBtn) {
            const newBtn = closeCartBtn.cloneNode(true);
            closeCartBtn.parentNode.replaceChild(newBtn, closeCartBtn);
            newBtn.addEventListener('click', () => {
                console.log('❌ Cerrando carrito');
                if (typeof window.closeCartDrawer === 'function') {
                    window.closeCartDrawer();
                }
            });
        }
        
        const overlay = document.getElementById('overlay');
        if (overlay) {
            const newOverlay = overlay.cloneNode(true);
            overlay.parentNode.replaceChild(newOverlay, overlay);
            newOverlay.addEventListener('click', () => {
                if (typeof window.closeCartDrawer === 'function') {
                    window.closeCartDrawer();
                }
                if (typeof closeImageModal === 'function') {
                    closeImageModal();
                }
            });
        }
        
        if (typeof loadCartFromStorage === 'function') {
            loadCartFromStorage();
        }
        
        if (typeof renderCart === 'function') {
            renderCart();
        }
        
        if (typeof updateSavedPhoneDisplay === 'function') {
            updateSavedPhoneDisplay();
        }
        
    });

    window.addEventListener('cartUpdated', function() {
        if (typeof renderCart === 'function') {
            renderCart();
        }
        if (typeof updateCartBadge === 'function') {
            updateCartBadge();
        }
    });
  </script>

  <footer class="app-footer">
    <div class="footer-content">
      <div class="footer-logo">
        <span class="logo-mark">Z&R</span>
      </div>
      <div class="footer-social">
        <a href="https://www.facebook.com/tu_pagina" target="_blank" class="social-link" aria-label="Facebook">Facebook</a>
      </div>
      <div class="footer-copyright">
        <p>© 2026 Z&R - Todos los derechos reservados</p>
      </div>
    </div>
  </footer>












<!-- ========================= -->
<!-- DEBUG CONSOLE PRO MAX -->
<!-- PEGAR ANTES DE </body> -->
<!-- ========================= -->

<div id="dbgWrap" style="position:fixed;right:18px;bottom:18px;width:460px;height:390px;max-width:95vw;max-height:85vh;background:#0b0b11;border:1px solid #222;border-radius:14px;z-index:999999;box-shadow:0 20px 50px rgba(0,0,0,.55);overflow:hidden;resize:both;font-family:Segoe UI,Arial,sans-serif;color:#fff;display:flex;flex-direction:column;">

<div id="dbgHeader" style="background:#141420;padding:10px;cursor:grab;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222;user-select:none;">

<div>
<div style="font-size:13px;font-weight:700;color:#00ff88;">🧠 DEBUG CONSOLE PRO MAX</div>
<div style="font-size:10px;color:#aaa;" id="dbgStats">LOG:0 | WARN:0 | ERR:0 | NET:0</div>
</div>

<div style="display:flex;gap:6px;">
<button id="dbgPause" style="all:unset;cursor:pointer;padding:4px 7px;background:#222;border-radius:7px;">⏸</button>
<button id="dbgMin" style="all:unset;cursor:pointer;padding:4px 7px;background:#222;border-radius:7px;">─</button>
<button id="dbgClose" style="all:unset;cursor:pointer;padding:4px 7px;background:#222;border-radius:7px;">✕</button>
</div>

</div>

<div id="dbgTools" style="padding:8px;background:#101018;border-bottom:1px solid #222;display:flex;gap:6px;flex-wrap:wrap;">
<input id="dbgSearch" placeholder="Buscar..." style="flex:1;min-width:120px;background:#0a0a10;color:#fff;border:1px solid #333;padding:7px 10px;border-radius:8px;outline:none;">
<button class="dbgFilter" data-type="all" style="all:unset;cursor:pointer;padding:6px 8px;background:#1a1a24;border-radius:7px;">ALL</button>
<button class="dbgFilter" data-type="error" style="all:unset;cursor:pointer;padding:6px 8px;background:#1a1a24;border-radius:7px;">ERR</button>
<button class="dbgFilter" data-type="warn" style="all:unset;cursor:pointer;padding:6px 8px;background:#1a1a24;border-radius:7px;">WARN</button>
<button class="dbgFilter" data-type="net" style="all:unset;cursor:pointer;padding:6px 8px;background:#1a1a24;border-radius:7px;">NET</button>
<button id="dbgClear" style="all:unset;cursor:pointer;padding:6px 8px;background:#1a1a24;border-radius:7px;">🧹</button>
<button id="dbgExport" style="all:unset;cursor:pointer;padding:6px 8px;background:#1a1a24;border-radius:7px;">⬇</button>
</div>

<div id="dbgBody" style="flex:1;overflow:auto;padding:8px;font-family:Consolas,monospace;font-size:12px;"></div>

</div>

<div id="dbgMini" style="display:none;position:fixed;right:18px;bottom:18px;z-index:999998;background:#111;color:#00ff88;border:1px solid #00ff88;padding:10px 14px;border-radius:999px;font-family:monospace;cursor:pointer;">📟 Consola</div>

<script>
(function(){

if(window.__DBG_INSTALLED__) return;
window.__DBG_INSTALLED__=true;

const wrap = document.getElementById("dbgWrap");
const body = document.getElementById("dbgBody");
const stats = document.getElementById("dbgStats");
const mini = document.getElementById("dbgMini");

let paused=false;
let filter="all";

let c={log:0,warn:0,error:0,net:0};

function updateStats(){
stats.textContent=`LOG:${c.log} | WARN:${c.warn} | ERR:${c.error} | NET:${c.net}`;
}

function now(){
const d=new Date();
return d.toLocaleTimeString();
}

function add(type,msg){

if(paused) return;

const div=document.createElement("div");

let color="#00ff88",bg="#101016";

if(type==="error"){color="#ff7777";bg="#2a1111";}
if(type==="warn"){color="#ffcc66";bg="#2a220f";}
if(type==="net"){color="#66c7ff";bg="#102030";}

div.dataset.type=type;
div.style.cssText="padding:6px 8px;margin-bottom:5px;border-left:3px solid "+color+";background:"+bg+";border-radius:7px;color:"+color+";white-space:pre-wrap;word-break:break-word;";
div.textContent="["+now()+"] "+msg;

body.appendChild(div);
body.scrollTop=body.scrollHeight;

while(body.children.length>1800){
body.removeChild(body.firstChild);
}

saveLogs();
applyFilter();
}

function applyFilter(){

const q=document.getElementById("dbgSearch").value.toLowerCase();

[...body.children].forEach(el=>{

const okType = filter==="all" || el.dataset.type===filter;
const okText = el.textContent.toLowerCase().includes(q);

el.style.display = (okType && okText) ? "block":"none";

});
}

function saveLogs(){
localStorage.setItem("DBG_LOGS",body.innerHTML);
}

function loadLogs(){
body.innerHTML=localStorage.getItem("DBG_LOGS")||"";
}

loadLogs();

const olog=console.log;
const owarn=console.warn;
const oerr=console.error;
const oinfo=console.info;

console.log=function(...a){
c.log++;updateStats();
add("log",a.join(" "));
olog.apply(console,a);
};

console.warn=function(...a){
c.warn++;updateStats();
add("warn",a.join(" "));
owarn.apply(console,a);
};

console.error=function(...a){
c.error++;updateStats();
add("error",a.join(" "));
oerr.apply(console,a);
};

console.info=function(...a){
c.log++;updateStats();
add("log",a.join(" "));
oinfo.apply(console,a);
};

window.onerror=function(msg,src,line,col,error){
c.error++;updateStats();
add("error","💀 "+msg+" ("+line+":"+col+")");
};

window.addEventListener("unhandledrejection",e=>{
c.error++;updateStats();
add("error","Promise rejection: "+e.reason);
});

const oldFetch=window.fetch;

if(oldFetch){
window.fetch=async(...args)=>{
const t=performance.now();
try{
const res=await oldFetch(...args);
const ms=(performance.now()-t).toFixed(0);
c.net++;updateStats();
add("net","🌐 "+args[0]+" ["+res.status+"] "+ms+"ms");
return res;
}catch(err){
c.net++;c.error++;updateStats();
add("error","🌐 FAIL "+args[0]);
throw err;
}
};
}

dbgSearch.oninput=applyFilter;

document.querySelectorAll(".dbgFilter").forEach(btn=>{
btn.onclick=()=>{
filter=btn.dataset.type;
applyFilter();
};
});

dbgClear.onclick=()=>{
body.innerHTML="";
saveLogs();
};

dbgExport.onclick=()=>{
const blob=new Blob([body.innerText],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="debug_logs.txt";
a.click();
};

dbgPause.onclick=()=>{
paused=!paused;
dbgPause.textContent=paused?"▶":"⏸";
};

dbgMin.onclick=()=>{
if(dbgBody.style.display==="none"){
dbgBody.style.display="";
dbgTools.style.display="";
dbgMin.textContent="─";
}else{
dbgBody.style.display="none";
dbgTools.style.display="none";
dbgMin.textContent="□";
wrap.style.height="auto";
}
};

dbgClose.onclick=()=>{
wrap.style.display="none";
mini.style.display="block";
};

mini.onclick=()=>{
wrap.style.display="flex";
mini.style.display="block";
mini.style.display="none";
};

let drag=false,dx=0,dy=0;

dbgHeader.onmousedown=(e)=>{
drag=true;
const r=wrap.getBoundingClientRect();
dx=e.clientX-r.left;
dy=e.clientY-r.top;
};

document.addEventListener("mousemove",(e)=>{
if(!drag)return;
wrap.style.left=(e.clientX-dx)+"px";
wrap.style.top=(e.clientY-dy)+"px";
wrap.style.right="auto";
wrap.style.bottom="auto";
});

document.addEventListener("mouseup",()=>drag=false);

setInterval(()=>{
if(performance.memory){
console.info("RAM "+
(performance.memory.usedJSHeapSize/1048576).toFixed(1)+"MB");
}
},20000);

console.info("🚀 Debug PRO MAX cargada");

})();
</script>


  










  
</body>
</html>
