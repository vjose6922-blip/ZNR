    <div class="header-right">
      <button class="icon-button" id="layout-toggle-looks" aria-label="Cambiar layout">📱</button>

    </div>
  </header>

  <div class="looks-nav">
    <a href="index.html" style="background:#ff4f81; color:white;">Catalogo</a>
  </div>

    <div class="looks-grid" id="looks-container"></div>

  <button class="floating-cart" id="floating-cart-btn" aria-label="Ver carrito">
    <span class="cart-icon">🛒</span>
    <span class="cart-badge" id="cart-count">0</span>
  </button>

  <aside class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-header">
      <h2>Tu carrito</h2>
      <button class="icon-button" id="close-cart-btn" aria-label="Cerrar carrito">✕</button>
    </div>
    <div class="cart-body" id="cart-items-container"></div>
    <div class="cart-footer">
      <div class="cart-summary-row">
        <span>Subtotal</span>
        <span id="cart-subtotal">$0</span>
      </div>
      <div class="cart-summary-row total">
        <span>Total</span>
        <span id="cart-total">$0</span>
      </div>
      <div id="saved-phone-container" style="font-size: 11px; text-align: center; margin: 8px 0; color: #666; display: none;">
        📱 Número guardado: <span id="saved-phone-display"></span>
        <button id="change-phone-btn" style="background: none; border: none; color: #ff4f81; cursor: pointer; text-decoration: underline; margin-left: 5px;">Cambiar</button>
      </div>
      <button id="request-purchase-btn" class="primary-button full-width" style="background: linear-gradient(135deg, #25D366, #128C7E); margin-top: 8px;">
        📝 Solicitar compra
      </button>
    </div>
  </aside>

  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <div class="image-modal" id="image-modal" aria-hidden="true">
    <button class="icon-button close-image-modal" id="close-image-modal">✕</button>
    <img id="image-modal-img" alt="Vista de producto" />
  </div>

     <script src="common.js" defer></script>
  <script src="looks.js" defer></script>
  <script src="cache-manager.js" defer></script>
  <script>
    // Este script NO tiene defer - debe ejecutarse rápido para registrar el SW
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/ZNR/sw.js')
          .then(registration => console.log('✅ SW registrado:', registration.scope))
          .catch(error => console.log('❌ Error SW:', error));
      });
    }
  </script>

  <script defer>
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 Inicializando página con modales personalizados...');
        
        window.changePhoneNumber = changePhoneNumber;
        window.updateSavedPhoneDisplay = updateSavedPhoneDisplay;
        window.openCartDrawer = openCartDrawer;
        window.closeCartDrawer = closeCartDrawer;
        window.renderCart = renderCart;
        window.addToCart = addToCart;
        
        const floatingCartBtn = document.getElementById('floating-cart-btn');
        if (floatingCartBtn) {
            const newBtn = floatingCartBtn.cloneNode(true);
            floatingCartBtn.parentNode.replaceChild(newBtn, floatingCartBtn);
            newBtn.addEventListener('click', () => {
                console.log('🛒 Abriendo carrito');
                if (typeof window.openCartDrawer === 'function') {
                    window.openCartDrawer();
                }
            });
        }
        
        const closeCartBtn = document.getElementById('close-cart-btn');
        if (closeCartBtn) {
            const newBtn = closeCartBtn.cloneNode(true);
            closeCartBtn.parentNode.replaceChild(newBtn, closeCartBtn);
            newBtn.addEventListener('click', () => {
                console.log('❌ Cerrando carrito');
                if (typeof window.closeCartDrawer === 'function') {
                    window.closeCartDrawer();
                }
            });
        }
        
        const overlay = document.getElementById('overlay');
        if (overlay) {
            const newOverlay = overlay.cloneNode(true);
            overlay.parentNode.replaceChild(newOverlay, overlay);
            newOverlay.addEventListener('click', () => {
                if (typeof window.closeCartDrawer === 'function') {
                    window.closeCartDrawer();
                }
                if (typeof closeImageModal === 'function') {
                    closeImageModal();
                }
            });
        }
        
        if (typeof loadCartFromStorage === 'function') {
            loadCartFromStorage();
        }
        
        if (typeof renderCart === 'function') {
            renderCart();
        }
        
        if (typeof updateSavedPhoneDisplay === 'function') {
            updateSavedPhoneDisplay();
        }
        
    });

    window.addEventListener('cartUpdated', function() {
        if (typeof renderCart === 'function') {
            renderCart();
        }
        if (typeof updateCartBadge === 'function') {
            updateCartBadge();
        }
    });
  </script>

<script>
(function(){
  if(window.__DBG_ULTRA_PRO__) return;
  window.__DBG_ULTRA_PRO__ = true;

  // ============ CREAR ESTRUCTURA HTML DINÁMICAMENTE ============
  const consoleHTML = `
  <div id="dbgWrap" style="position:fixed;right:18px;bottom:18px;width:550px;height:520px;max-width:96vw;max-height:86vh;background:#0b0b11;border:1px solid #2a2a35;border-radius:14px;z-index:999999;box-shadow:0 22px 60px rgba(0,0,0,.65);overflow:hidden;resize:both;font-family:'Segoe UI',Consolas,monospace;color:#fff;display:flex;flex-direction:column;">
    
    <!-- HEADER -->
    <div id="dbgHeader" style="background:#141420;padding:8px 12px;cursor:grab;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a35;user-select:none;">
      <div>
        <div style="font-size:12px;font-weight:700;color:#00ff88;">🐉 DEBUG CONSOLE ULTRA PRO v4.0</div>
        <div id="dbgStats" style="font-size:9px;color:#888;">LOG:0 | WARN:0 | ERR:0 | NET:0 | ⚡0/s</div>
      </div>
      <div style="display:flex;gap:5px;">
        <button id="dbgPause" style="all:unset;cursor:pointer;padding:4px 8px;background:#222;border-radius:6px;font-size:11px;" title="Pausar">⏸</button>
        <button id="dbgAutoScroll" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a6e3a;border-radius:6px;font-size:11px;" title="Auto-scroll">📌</button>
        <button id="dbgMin" style="all:unset;cursor:pointer;padding:4px 8px;background:#222;border-radius:6px;font-size:11px;" title="Minimizar">─</button>
        <button id="dbgClose" style="all:unset;cursor:pointer;padding:4px 8px;background:#222;border-radius:6px;font-size:11px;" title="Cerrar">✕</button>
      </div>
    </div>
    
    <!-- TOOLBAR -->
    <div id="dbgTools" style="padding:6px 8px;background:#101018;border-bottom:1px solid #2a2a35;display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
      <input id="dbgSearch" placeholder="Buscar (regex: /patron/flags)" style="flex:1;min-width:120px;background:#0a0a10;color:#fff;border:1px solid #333;padding:5px 8px;border-radius:6px;outline:none;font-size:11px;">
      <button class="dbgFilter" data-type="all" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a1a24;border-radius:5px;font-size:10px;">ALL</button>
      <button class="dbgFilter" data-type="error" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a1a24;border-radius:5px;font-size:10px;">ERR</button>
      <button class="dbgFilter" data-type="warn" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a1a24;border-radius:5px;font-size:10px;">WARN</button>
      <button class="dbgFilter" data-type="net" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a1a24;border-radius:5px;font-size:10px;">NET</button>
      <button id="dbgClear" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a1a24;border-radius:5px;font-size:11px;" title="Limpiar">🧹</button>
      <button id="dbgExport" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a1a24;border-radius:5px;font-size:11px;" title="Exportar">⬇</button>
      <button id="dbgStatsBtn" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a1a24;border-radius:5px;font-size:11px;" title="Estadísticas">📊</button>
      <button id="dbgSettings" style="all:unset;cursor:pointer;padding:4px 8px;background:#1a1a24;border-radius:5px;font-size:11px;" title="Configuración">⚙</button>
    </div>
    
    <!-- REPL CONSOLE (EJECUTAR COMANDOS) -->
    <div id="dbgRepl" style="border-bottom:1px solid #2a2a35;background:#0a0a0f;padding:6px 8px;display:flex;flex-direction:column;gap:4px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="color:#00ff88;font-size:10px;font-weight:bold;">⚡ REPL &gt;</span>
        <input id="dbgCommand" type="text" placeholder="Ejecuta JavaScript (ej: document.title, 2+2, localStorage.clear())" 
               style="flex:1;background:#0f0f15;color:#fff;border:1px solid #333;padding:4px 8px;border-radius:5px;font-family:Consolas,monospace;font-size:10px;outline:none;">
        <button id="dbgExec" style="all:unset;cursor:pointer;padding:3px 10px;background:#1a6e3a;border-radius:5px;color:#fff;font-size:10px;">▶</button>
        <button id="dbgClearRepl" style="all:unset;cursor:pointer;padding:3px 8px;background:#333;border-radius:5px;color:#fff;font-size:10px;">🗑</button>
      </div>
      <div id="dbgReplOutput" style="background:#050508;border-radius:5px;padding:4px;font-family:Consolas,monospace;font-size:10px;max-height:120px;overflow:auto;display:none;">
        <div style="color:#888;font-size:9px;">📟 Historial:</div>
        <div id="dbgReplContent"></div>
      </div>
      <div id="dbgQuickCommands" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
    </div>
    
    <!-- BODY DE LOGS -->
    <div id="dbgBody" style="flex:1;overflow:auto;padding:6px;font-family:Consolas,monospace;font-size:11px;background:#0b0b11;"></div>
  </div>
  
  <!-- MINI VERSION -->
  <div id="dbgMini" style="display:none;position:fixed;right:18px;bottom:18px;background:#0b0b11;color:#00ff88;border:1px solid #00ff88;padding:8px 12px;border-radius:999px;z-index:999998;cursor:pointer;font-family:monospace;font-size:12px;box-shadow:0 4px 12px rgba(0,0,0,.3);">🐉 Consola</div>
  `;

  document.body.insertAdjacentHTML('beforeend', consoleHTML);

  // ============ REFERENCIAS DOM ============
  const wrap = document.getElementById('dbgWrap');
  const body = document.getElementById('dbgBody');
  const mini = document.getElementById('dbgMini');
  const stats = document.getElementById('dbgStats');
  const commandInput = document.getElementById('dbgCommand');
  const execBtn = document.getElementById('dbgExec');
  const replOutput = document.getElementById('dbgReplOutput');
  const replContent = document.getElementById('dbgReplContent');
  const clearReplBtn = document.getElementById('dbgClearRepl');
  const quickCommandsDiv = document.getElementById('dbgQuickCommands');

  // ============ VARIABLES GLOBALES ============
  let paused = false;
  let filter = 'all';
  let autoScroll = true;
  let logRate = [];
  let commandHistory = [];
  let historyIndex = -1;
  let pinnedLogs = new Set();
  
  const count = { log: 0, warn: 0, error: 0, net: 0 };
  let lastLogTime = Date.now();
  let logsPerSecond = 0;

  // ============ FUNCIONES UTILITARIAS ============
  function updateStats() {
    stats.textContent = `LOG:${count.log} | WARN:${count.warn} | ERR:${count.error} | NET:${count.net} | ⚡${logsPerSecond}/s`;
  }

  function stamp() {
    const d = new Date();
    return d.toLocaleTimeString('es-ES', { hour12: false });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function formatArg(x) {
    if (x instanceof Error) return x.stack || (x.name + ': ' + x.message);
    if (typeof x === 'object') {
      try {
        return JSON.stringify(x, null, 2);
      } catch(e) {
        return String(x);
      }
    }
    return String(x);
  }

  function getLineFromStack(stack) {
    const m = stack.match(/(https?:\/\/.*|[\w\-\/\.]+\.js:\d+:\d+)/);
    return m ? m[0] : '';
  }

  // ============ FUNCIÓN PRINCIPAL ADD LOG ============
  function add(type, msg, isPinned = false) {
    if (paused) return;

    // Actualizar rate
    const now = Date.now();
    logRate.push(now);
    logRate = logRate.filter(t => now - t < 1000);
    logsPerSecond = logRate.length;

    // Actualizar contadores
    if (type === 'log') count.log++;
    else if (type === 'warn') count.warn++;
    else if (type === 'error') count.error++;
    else if (type === 'net') count.net++;
    updateStats();

    // Estilos según tipo
    let color = '#00ff88', bg = '#101016', icon = '📝';
    if (type === 'error') { color = '#ff7777'; bg = '#2a1111'; icon = '❌'; }
    if (type === 'warn') { color = '#ffcc66'; bg = '#2a220f'; icon = '⚠️'; }
    if (type === 'net') { color = '#66c7ff'; bg = '#102030'; icon = '🌐'; }

    const div = document.createElement('div');
    div.dataset.type = type;
    div.dataset.timestamp = now;
    if (isPinned) div.dataset.pinned = 'true';
    div.style.cssText = `margin-bottom:6px;border-left:3px solid ${color};background:${bg};border-radius:6px;padding:5px 8px;font-size:11px;transition:all 0.2s;`;
    
    if (isPinned) {
      div.style.border = '1px solid #ffcc66';
      div.style.background = '#2a2a1a';
    }

    const firstLine = msg.split('\n')[0];
    const rest = msg.split('\n').slice(1).join('\n');

    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="color:${color};font-weight:600;">${icon} [${stamp()}] ${escapeHtml(firstLine)}</div>
        <div style="display:flex;gap:4px;">
          <button class="dbg-copy-log" data-msg="${escapeHtml(msg)}" style="all:unset;cursor:pointer;color:#888;font-size:9px;" title="Copiar">📋</button>
          <button class="dbg-pin-log" style="all:unset;cursor:pointer;color:#888;font-size:9px;" title="${isPinned ? 'Desanclar' : 'Anclar'}">${isPinned ? '📌' : '📍'}</button>
        </div>
      </div>
    `;

    if (rest.trim()) {
      const stackId = 'stk_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      div.innerHTML += `
        <div style="margin-top:3px;">
          <button onclick="var e=document.getElementById('${stackId}');e.style.display=e.style.display==='none'?'block':'none';" style="all:unset;cursor:pointer;color:#8ab4ff;font-size:9px;">▼ Stack</button>
        </div>
        <pre id="${stackId}" style="display:none;margin-top:4px;background:#00000044;padding:5px;border-radius:5px;white-space:pre-wrap;color:#ddd;font-size:9px;overflow-x:auto;">${escapeHtml(rest)}</pre>
      `;
    }

    body.appendChild(div);
    if (autoScroll && !paused) body.scrollTop = body.scrollHeight;

    // Limitar cantidad de logs (virtual scrolling mejorado)
    while (body.children.length > 2000) {
      body.removeChild(body.firstChild);
    }

    saveLogs();
    applyFilter();

    // Notificación para errores
    if (type === 'error' && !isPinned) {
      showToast('🔴 Error capturado', msg.slice(0, 80));
    }
  }

  // ============ TOAST NOTIFICATIONS ============
  function showToast(title, message) {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;top:20px;right:20px;background:#1a1a2a;border-left:4px solid #ff4444;padding:10px 15px;border-radius:8px;z-index:1000001;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:slideIn 0.3s ease-out;max-width:300px;';
    toast.innerHTML = `<div style="color:#ff7777;font-weight:bold;font-size:12px;">${title}</div><div style="color:#ccc;font-size:11px;margin-top:4px;">${escapeHtml(message)}</div>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ============ FILTRADO Y BÚSQUEDA ============
  function applyFilter() {
    const searchTerm = document.getElementById('dbgSearch').value;
    let regex = null;

    if (searchTerm.startsWith('/') && searchTerm.lastIndexOf('/') > 0) {
      try {
        const match = searchTerm.match(/^\/(.+)\/([gimuy]*)$/);
        if (match) regex = new RegExp(match[1], match[2]);
      } catch(e) {}
    }

    [...body.children].forEach(el => {
      const okType = filter === 'all' || el.dataset.type === filter;
      let okText = true;
      
      if (regex) {
        okText = regex.test(el.textContent);
      } else if (searchTerm) {
        okText = el.textContent.toLowerCase().includes(searchTerm.toLowerCase());
      }
      
      el.style.display = (okType && okText) ? 'block' : 'none';
    });
  }

  // ============ PERSISTENCIA ============
  function saveLogs() {
    try {
      const logsToSave = [];
      for (let i = 0; i < Math.min(body.children.length, 500); i++) {
        logsToSave.push(body.children[i].outerHTML);
      }
      localStorage.setItem('DBG_ULTRA_LOGS', JSON.stringify(logsToSave));
      localStorage.setItem('DBG_ULTRA_COUNTS', JSON.stringify(count));
    } catch(e) {}
  }

  function loadLogs() {
    try {
      const saved = localStorage.getItem('DBG_ULTRA_LOGS');
      if (saved) {
        const logs = JSON.parse(saved);
        body.innerHTML = logs.join('');
        const savedCounts = localStorage.getItem('DBG_ULTRA_COUNTS');
        if (savedCounts) {
          const c = JSON.parse(savedCounts);
          Object.assign(count, c);
          updateStats();
        }
      }
    } catch(e) {}
  }

  // ============ REPL - EJECUTAR COMANDOS ============
  function executeCommand(cmd) {
    if (!cmd.trim()) return;
    
    commandHistory.unshift(cmd);
    if (commandHistory.length > 50) commandHistory.pop();
    historyIndex = -1;
    
    replOutput.style.display = 'block';
    
    const outputDiv = document.createElement('div');
    outputDiv.style.marginBottom = '6px';
    outputDiv.style.borderBottom = '1px solid #222';
    outputDiv.style.padding = '3px';
    
    outputDiv.innerHTML = `<div style="color:#00ff88;font-size:9px;">❯ ${escapeHtml(cmd)}</div>`;
    
    try {
      let result = eval(cmd);
      
      if (result === undefined) {
        result = 'undefined';
      } else if (result instanceof HTMLElement) {
        result = `📦 ${result.tagName}${result.id ? '#'+result.id : ''}${result.className ? '.'+result.className : ''}`;
      } else if (typeof result === 'object' && result !== null) {
        try {
          result = JSON.stringify(result, null, 2);
          if (result.length > 500) result = result.slice(0, 500) + '...';
        } catch(e) {
          result = String(result);
        }
      } else {
        result = String(result);
      }
      
      outputDiv.innerHTML += `<div style="color:#aaa;font-size:9px;margin-top:2px;">← ${escapeHtml(result)}</div>`;
      
      add('log', `REPL: ${cmd} → ${result.slice(0, 200)}`);
      
    } catch(error) {
      outputDiv.innerHTML += `<div style="color:#ff7777;margin-top:2px;">✗ ${escapeHtml(error.message)}</div>`;
      add('error', `REPL Error: ${error.message}\n${error.stack}`);
    }
    
    replContent.prepend(outputDiv);
    while(replContent.children.length > 30) {
      replContent.removeChild(replContent.lastChild);
    }
    
    commandInput.value = '';
  }

  // ============ COMANDOS RÁPIDOS ============
  const quickCommands = [
    { name: '📄 Info', cmd: '`${document.title} | ${location.href}`' },
    { name: '💾 Storage', cmd: '`${localStorage.length} items en localStorage`' },
    { name: '🔍 DOM', cmd: 'document.querySelectorAll("*").length + " elementos"' },
    { name: '💻 Memoria', cmd: 'performance.memory ? (performance.memory.usedJSHeapSize/1048576).toFixed(2) + " MB" : "N/A"' },
    { name: '🧹 Limpiar', cmd: 'dbgClear.click(); "Logs limpiados"' },
    { name: '📊 Stats', cmd: 'dbgStatsBtn.click(); "Estadísticas"' }
  ];

  quickCommands.forEach(qc => {
    const btn = document.createElement('button');
    btn.textContent = qc.name;
    btn.style.cssText = 'all:unset;cursor:pointer;padding:2px 6px;background:#1a1a2a;border-radius:4px;font-size:9px;';
    btn.onclick = () => {
      commandInput.value = qc.cmd;
      executeCommand(qc.cmd);
    };
    quickCommandsDiv.appendChild(btn);
  });

  // ============ ESTADÍSTICAS AVANZADAS ============
  let statsPanel = null;
  function showStats() {
    if (statsPanel) {
      statsPanel.remove();
      statsPanel = null;
      return;
    }
    
    statsPanel = document.createElement('div');
    statsPanel.style.cssText = 'position:fixed;bottom:100px;right:20px;background:#0b0b11;border:1px solid #2a2a35;border-radius:10px;padding:12px;width:240px;z-index:999997;box-shadow:0 8px 20px rgba(0,0,0,.5);';
    
    const errorRate = ((count.error / (count.log + 1)) * 100).toFixed(1);
    const memory = performance.memory ? (performance.memory.usedJSHeapSize / 1048576).toFixed(0) + ' MB' : 'N/A';
    
    statsPanel.innerHTML = `
      <div style="font-weight:bold;color:#00ff88;margin-bottom:8px;">📊 ESTADÍSTICAS</div>
      <div style="font-size:11px;margin:4px 0;">📝 Total logs: ${count.log + count.warn + count.error + count.net}</div>
      <div style="font-size:11px;margin:4px 0;">❌ Error rate: ${errorRate}%</div>
      <div style="font-size:11px;margin:4px 0;">⚡ Logs/seg: ${logsPerSecond}</div>
      <div style="font-size:11px;margin:4px 0;">💾 Memoria: ${memory}</div>
      <div style="font-size:11px;margin:4px 0;">📌 Pinned: ${pinnedLogs.size}</div>
      <div style="font-size:11px;margin:4px 0;">🕐 Uptime: ${Math.floor((Date.now() - window.__DBG_START__) / 1000)}s</div>
      <button id="closeStats" style="all:unset;cursor:pointer;margin-top:8px;padding:4px;background:#333;border-radius:4px;font-size:10px;width:100%;text-align:center;">Cerrar</button>
    `;
    
    document.body.appendChild(statsPanel);
    document.getElementById('closeStats').onclick = () => {
      statsPanel.remove();
      statsPanel = null;
    };
  }

  // ============ EXPORTAR LOGS ============
  function exportLogs(format) {
    let content = '';
    let filename = `debug_logs_${Date.now()}`;
    
    switch(format) {
      case 'txt':
        content = [...body.children].map(c => c.textContent).join('\n');
        filename += '.txt';
        break;
      case 'json':
        const data = [...body.children].map(c => ({
          type: c.dataset.type,
          message: c.textContent,
          timestamp: c.dataset.timestamp
        }));
        content = JSON.stringify(data, null, 2);
        filename += '.json';
        break;
      case 'html':
        content = body.innerHTML;
        filename += '.html';
        break;
    }
    
    const blob = new Blob([content], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('✅ Exportado', `Archivo ${filename} guardado`);
  }

  // ============ CONFIGURACIÓN ============
  function showSettings() {
    const settings = prompt('Configuración:\n\n1. Límite de logs (actual: 2000)\n2. Notificaciones (actual: activadas)\n3. Persistencia (actual: activada)\n\nEscribe el número de la opción a configurar:', '1');
    if (settings === '1') {
      const newLimit = prompt('Nuevo límite de logs (actual 2000):', '2000');
      if (newLimit && !isNaN(newLimit)) {
        // Se aplicaría en el while de add()
        showToast('⚙️ Configuración', `Límite cambiado a ${newLimit} (reinicie para aplicar)`);
      }
    }
  }

  // ============ EVENTOS Y MANEJADORES ============
  document.querySelectorAll('.dbgFilter').forEach(btn => {
    btn.onclick = () => {
      filter = btn.dataset.type;
      applyFilter();
    };
  });

  document.getElementById('dbgSearch').oninput = applyFilter;
  document.getElementById('dbgClear').onclick = () => {
    if (body.children.length > 100 && !confirm(`¿Limpiar ${body.children.length} logs?`)) return;
    body.innerHTML = '';
    saveLogs();
    showToast('🧹 Consola limpia', 'Todos los logs han sido eliminados');
  };
  
  document.getElementById('dbgExport').onclick = () => {
    const format = prompt('Formato de exportación (txt, json, html):', 'txt');
    if (format && ['txt', 'json', 'html'].includes(format)) exportLogs(format);
    else showToast('❌ Error', 'Formato no válido');
  };
  
  document.getElementById('dbgStatsBtn').onclick = showStats;
  document.getElementById('dbgSettings').onclick = showSettings;
  
  document.getElementById('dbgPause').onclick = () => {
    paused = !paused;
    document.getElementById('dbgPause').textContent = paused ? '▶' : '⏸';
    document.getElementById('dbgPause').style.background = paused ? '#6e3a1a' : '#222';
    showToast(paused ? '⏸ Pausado' : '▶ Reanudado', '');
  };
  
  const autoScrollBtn = document.getElementById('dbgAutoScroll');
  autoScrollBtn.onclick = () => {
    autoScroll = !autoScroll;
    autoScrollBtn.style.background = autoScroll ? '#1a6e3a' : '#6e3a1a';
    autoScrollBtn.textContent = autoScroll ? '📌' : '📍';
  };
  
  document.getElementById('dbgMin').onclick = () => {
    const bodyEl = document.getElementById('dbgBody');
    const tools = document.getElementById('dbgTools');
    const repl = document.getElementById('dbgRepl');
    if (bodyEl.style.display === 'none') {
      bodyEl.style.display = '';
      tools.style.display = '';
      repl.style.display = '';
      document.getElementById('dbgMin').textContent = '─';
      wrap.style.height = '';
    } else {
      bodyEl.style.display = 'none';
      tools.style.display = 'none';
      repl.style.display = 'none';
      document.getElementById('dbgMin').textContent = '□';
      wrap.style.height = 'auto';
    }
  };
  
  document.getElementById('dbgClose').onclick = () => {
    wrap.style.display = 'none';
    mini.style.display = 'block';
  };
  
  mini.onclick = () => {
    wrap.style.display = 'flex';
    mini.style.display = 'none';
  };
  
  // REPL Eventos
  execBtn.onclick = () => executeCommand(commandInput.value);
  clearReplBtn.onclick = () => {
    replContent.innerHTML = '';
    replOutput.style.display = 'none';
  };
  
  commandInput.onkeydown = (e) => {
    if (e.key === 'Enter') executeCommand(commandInput.value);
    else if (e.key === 'ArrowUp') {
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        commandInput.value = commandHistory[historyIndex];
      }
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      if (historyIndex > 0) {
        historyIndex--;
        commandInput.value = commandHistory[historyIndex];
      } else if (historyIndex === 0) {
        historyIndex = -1;
        commandInput.value = '';
      }
      e.preventDefault();
    }
  };
  
  // Drag & Drop mejorado
  let drag = false, dx = 0, dy = 0;
  const header = document.getElementById('dbgHeader');
  header.onmousedown = (e) => {
    if (e.target.tagName === 'BUTTON') return;
    drag = true;
    const r = wrap.getBoundingClientRect();
    dx = e.clientX - r.left;
    dy = e.clientY - r.top;
    wrap.style.transition = 'none';
  };
  
  document.addEventListener('mousemove', (e) => {
    if (!drag) return;
    let newLeft = e.clientX - dx;
    let newTop = e.clientY - dy;
    newLeft = Math.min(Math.max(0, newLeft), window.innerWidth - wrap.offsetWidth);
    newTop = Math.min(Math.max(0, newTop), window.innerHeight - wrap.offsetHeight);
    wrap.style.left = newLeft + 'px';
    wrap.style.top = newTop + 'px';
    wrap.style.right = 'auto';
    wrap.style.bottom = 'auto';
  });
  
  document.addEventListener('mouseup', () => {
    drag = false;
    wrap.style.transition = '';
  });
  
  // Copiar y anclar logs (delegación de eventos)
  body.addEventListener('click', (e) => {
    const copyBtn = e.target.closest('.dbg-copy-log');
    if (copyBtn) {
      const msg = copyBtn.dataset.msg;
      navigator.clipboard.writeText(msg);
      showToast('📋 Copiado', 'Log copiado al portapapeles');
    }
    
    const pinBtn = e.target.closest('.dbg-pin-log');
    if (pinBtn) {
      const logDiv = pinBtn.closest('[data-type]');
      if (logDiv) {
        const isPinned = logDiv.dataset.pinned === 'true';
        if (isPinned) {
          delete logDiv.dataset.pinned;
          logDiv.style.border = '';
          logDiv.style.background = '';
          pinnedLogs.delete(logDiv);
        } else {
          logDiv.dataset.pinned = 'true';
          logDiv.style.border = '1px solid #ffcc66';
          logDiv.style.background = '#2a2a1a';
          pinnedLogs.add(logDiv);
        }
        pinBtn.textContent = isPinned ? '📍' : '📌';
        pinBtn.title = isPinned ? 'Anclar' : 'Desanclar';
      }
    }
  });

  // ============ INTERCEPTAR CONSOLA Y ERRORES ============
  window.__DBG_START__ = Date.now();
  
  const clog = console.log;
  const cwarn = console.warn;
  const cerr = console.error;
  const cinfo = console.info;
  
  console.log = function(...a) { add('log', a.map(formatArg).join(' ')); clog.apply(console, a); };
  console.warn = function(...a) { add('warn', a.map(formatArg).join(' ')); cwarn.apply(console, a); };
  console.info = function(...a) { add('log', a.map(formatArg).join(' ')); cinfo.apply(console, a); };
  console.error = function(...a) { add('error', a.map(formatArg).join('\n')); cerr.apply(console, a); };
  
  window.onerror = function(msg, src, line, col, error) {
    if (error && error.stack) add('error', error.stack);
    else add('error', `${msg}\n${src}:${line}:${col}`);
    return false;
  };
  
  window.addEventListener('unhandledrejection', e => {
    if (e.reason instanceof Error) add('error', e.reason.stack || e.reason.message);
    else add('error', `Promise rejection:\n${String(e.reason)}`);
  });
  
  // Interceptar fetch
  const oldFetch = window.fetch;
  if (oldFetch) {
    window.fetch = async (...args) => {
      const t = performance.now();
      try {
        const res = await oldFetch(...args);
        const ms = (performance.now() - t).toFixed(0);
        count.net++;
        updateStats();
        add('net', `🌐 ${args[0]} [${res.status}] ${ms}ms`);
        return res;
      } catch(err) {
        count.net++;
        count.error++;
        updateStats();
        add('error', `🌐 FAIL ${args[0]}\n${err.stack || err}`);
        throw err;
      }
    };
  }
  
  // Interceptar XMLHttpRequest
  const XHR = XMLHttpRequest.prototype;
  const originalOpen = XHR.open;
  const originalSend = XHR.send;
  
  XHR.open = function(method, url) {
    this._dbgUrl = url;
    this._dbgMethod = method;
    return originalOpen.apply(this, arguments);
  };
  
  XHR.send = function() {
    const start = performance.now();
    this.addEventListener('loadend', () => {
      const ms = (performance.now() - start).toFixed(0);
      count.net++;
      updateStats();
      add('net', `🌐 ${this._dbgMethod} ${this._dbgUrl} [${this.status}] ${ms}ms`);
    });
    return originalSend.apply(this, arguments);
  };
  
  // ============ INICIALIZACIÓN ============
  loadLogs();
  setInterval(() => updateStats(), 1000);
  
  console.info('🐉 Debug Console Ultra Pro v4.0 iniciada - Usa la REPL para ejecutar comandos!');
  console.info('💡 Tips: Ctrl+K limpiar, Ctrl+F buscar, Esc cerrar, flechas en REPL para historial');
  
})();
</script>
