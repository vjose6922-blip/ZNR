<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Z&R</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
  <link rel="preload" href="styles.css" as="style">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-aeromexico">
  <div id="global-loader" class="global-loader hidden">
    <div class="loader-spinner"></div>
    <div class="loader-text">Cargando...</div>
  </div>

  <header class="app-header">
    <div class="header-left">
      <div class="logo-touch-area" id="secret-logo">
        <span class="logo-mark">Z&R</span>
      </div>
      <div class="header-text">
        <h1 class="app-title">Catálogo</h1>
        <p class="app-subtitle">Colección actual</p>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-button" id="refresh-btn" aria-label="Actualizar catálogo">⟳</button> 
      <button class="icon-button" id="layout-toggle-btn" aria-label="Cambiar vista">📱</button>
    </div>
  </header>

  <div class="looks-nav">
    <a href="index.html">🏠 Catálogo</a>
    <a href="looks.html" style="background:#ff4f81; color:white;">✨ Looks</a>
  </div>

  <section class="filters-bar">
    <div class="filters-row-top">
      <div class="search-wrapper">
        <input type="search" id="search-input" placeholder="Buscar productos..." autocomplete="off" />
      </div>
      <select id="gender-filter" class="gender-select">
        <option value="">Todos</option>
        <option value="HOMBRE">👔 Caballero</option>
        <option value="MUJER">👗 Dama</option>
      </select>
    </div>
    <div class="filters-row-bottom">
      <select id="category-filter">
        <option value="">Todas las categorías</option>
      </select>
      <select id="sort-select">
        <option value="">Ordenar</option>
        <option value="price-asc">Precio: menor a mayor</option>
        <option value="price-desc">Precio: mayor a menor</option>
      </select>
    </div>
  </section>

  <main class="products-container" id="products-container"></main>

  <section class="pagination-section">
    <div id="pagination"></div>
  </section>

  <button class="floating-cart" id="floating-cart-btn" aria-label="Ver carrito">
    <span class="cart-icon">🛒</span>
    <span class="cart-badge" id="cart-count">0</span>
  </button>

  <aside class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-header">
      <h2>Tu carrito</h2>
      <button class="icon-button" id="close-cart-btn" aria-label="Cerrar carrito">✕</button>
    </div>
    <div class="cart-body" id="cart-items-container"></div>
    <div class="cart-footer">
      <div class="cart-summary-row">
        <span>Subtotal</span>
        <span id="cart-subtotal">$0</span>
      </div>
      <div class="cart-summary-row total">
        <span>Total</span>
        <span id="cart-total">$0</span>
      </div>
      <div id="saved-phone-container" style="font-size: 11px; text-align: center; margin: 8px 0; color: #666; display: none;">
        📱 Número guardado: <span id="saved-phone-display"></span>
        <button id="change-phone-btn" style="background: none; border: none; color: #ff4f81; cursor: pointer; text-decoration: underline; margin-left: 5px;">Cambiar</button>
      </div>
      <button id="request-purchase-btn" class="primary-button full-width" style="background: linear-gradient(135deg, #25D366, #128C7E); margin-top: 8px;">
        📝 Solicitar compra (verificar stock)
      </button>
    </div>
  </aside>

  <div class="overlay" id="overlay" aria-hidden="true"></div>
  
  <div class="image-modal" id="image-modal" aria-hidden="true">
    <button class="icon-button close-image-modal" id="close-image-modal">✕</button>
    <img id="image-modal-img" alt="Vista de producto" />
  </div>

  <script src="common.js"></script>
  <script src="script.js"></script>
  <script src="cache-manager.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
navigator.serviceWorker.register('/ZNR/sw.js')
  .then(registration => console.log('✅ SW registrado:', registration.scope))
          .catch(error => console.log('❌ Error SW:', error));
      });
    }
  </script>
  
  <footer class="app-footer">
    <div class="footer-content">
      <div class="footer-logo">
        <span class="logo-mark">Z&R</span>
      </div>
      <div class="footer-social">
        <a href="https://www.facebook.com/tu_pagina" target="_blank" class="social-link" aria-label="Facebook">Facebook</a>
      </div>
      <div class="footer-copyright">
        <p>© 2026 Z&R - Todos los derechos reservados</p>
      </div>
    </div>
  </footer>


<div id="debugConsole" style="
    background:#111;
    color:#0f0;
    padding:10px;
    font-family:monospace;
    height:200px;
    overflow-y:auto;
    border:1px solid #444;
">
<strong>Consola interna:</strong><br>
</div>
<script>
(function() {
    const div = document.getElementById("debugConsole");
 
    function printToDiv(type, args) {
        const msg = document.createElement("div");
        msg.textContent = `[${type}] ` + Array.from(args).join(" ");
        div.appendChild(msg);
        div.scrollTop = div.scrollHeight;
    }
 
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
 
    console.log = function() {
        printToDiv("LOG", arguments);
        originalLog.apply(console, arguments);
    };
 
    console.error = function() {
        printToDiv("ERROR", arguments);
        originalError.apply(console, arguments);
    };
 
    console.warn = function() {
        printToDiv("WARN", arguments);
        originalWarn.apply(console, arguments);
    };
 
    window.onerror = function(msg, url, line, col, error) {
        printToDiv("UNCAUGHT", [msg + " (" + url + ":" + line + ")"]);
    };
})();
</script>
  
</body>
</html>
