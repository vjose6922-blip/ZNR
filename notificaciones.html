<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Notificaciones - Z&R Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">

<style>
.notifications-wrapper {
  padding: 20px;
  max-width: 900px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.request-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  overflow: hidden;
  border: 1px solid var(--color-border-subtle);
}

.request-header {
  background: linear-gradient(135deg, #3b1f5f, #5a3b8a);
  color: white;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.request-id {
  font-family: monospace;
  font-size: 14px;
  background: rgba(255,255,255,0.2);
  padding: 4px 12px;
  border-radius: 20px;
}

.request-date {
  font-size: 12px;
  opacity: 0.8;
}

.request-products {
  padding: 0;
}

.request-product-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--color-border-subtle);
  transition: background 0.2s;
}

.request-product-item:hover {
  background: #f9f9fc;
}

.request-product-item.out-of-stock {
  background: #fff5f5;
  opacity: 0.7;
}

.request-product-img {
  width: 70px;
  height: 70px;
  object-fit: contain;
  background: #f5f5f8;
  border-radius: 12px;
  padding: 4px;
}

.request-product-info {
  flex: 1;
}

.request-product-name {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 4px;
}

.request-product-meta {
  font-size: 12px;
  color: var(--color-text-muted);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.request-product-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}

.status-pending {
  background: #fff3e0;
  color: #f97316;
}

.status-outofstock {
  background: #ffebee;
  color: #c62828;
}

.request-actions {
  padding: 16px 20px;
  background: #f8f8fc;
  display: flex;
  justify-content: flex-end;
  gap: 12px;
}

.btn {
  border: none;
  border-radius: var(--radius-pill);
  padding: 10px 24px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-confirm {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
}

.btn-confirm:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(34,197,94,0.3);
}

.btn-confirm:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-cancel {
  background: #ef4444;
  color: white;
}

.btn-cancel:hover {
  background: #dc2626;
}

.btn-secondary {
  background: #e0e0e0;
  color: #333;
}

.payment-link-container {
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  border-radius: 12px;
  padding: 16px;
  margin: 16px 20px;
  animation: fadeIn 0.3s ease;
}

.payment-link {
  word-break: break-all;
  font-size: 12px;
  color: #1565c0;
  margin: 8px 0;
}

.empty {
  text-align: center;
  color: var(--color-text-muted);
  padding: 60px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .notifications-wrapper {
    padding: 12px;
  }
  
  .request-header {
    flex-direction: column;
    align-items: flex-start;
  }
  
  .request-product-item {
    flex-wrap: wrap;
  }
  
  .request-product-img {
    width: 60px;
    height: 60px;
  }
  
  .request-actions {
    flex-direction: column;
  }
  
  .btn {
    text-align: center;
  }
}
</style>
</head>

<body class="theme-aeromexico">
<div id="global-loader" class="global-loader hidden">
  <div class="loader-spinner"></div>
  <div class="loader-text">Cargando...</div>
</div>

<header class="app-header">
  <div class="header-left">
    <div class="logo-touch-area">
      <span class="logo-mark">Z&R</span>
    </div>
    <div class="header-text">
      <h1 class="app-title">Notificaciones</h1>
      <p class="app-subtitle">Solicitudes de compra agrupadas</p>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-button" onclick="window.location='admin.html'">⬅</button>
    <button class="icon-button" onclick="location.reload()">⟳</button>
  </div>
</header>

<main class="notifications-wrapper" id="notifications"></main>

<script>
const API = "https://script.google.com/macros/s/AKfycbzNshrt3zldBNiyoB8x36ktCEO02H0cKxebiTuK7UAbsgd5R9biaCW7W4ihm1aVOJG7ww/exec";

function showLoader(text = "Cargando...") {
  const loader = document.getElementById("global-loader");
  const txt = loader.querySelector(".loader-text");
  if (txt) txt.textContent = text;
  loader.classList.remove("hidden");
}

function hideLoader() {
  const loader = document.getElementById("global-loader");
  loader.classList.add("hidden");
}

function escapeHtml(text) {
  if (!text) return "";
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

// Agrupar notificaciones por REQUEST_ID
function groupNotificationsByRequest(notifications) {
  const groups = new Map();
  
  notifications.forEach(notif => {
    const requestId = notif.REQUEST_ID || notif.ID_NOTIF;
    if (!groups.has(requestId)) {
      groups.set(requestId, {
        requestId: requestId,
        notifications: [],
        allPending: true
      });
    }
    groups.get(requestId).notifications.push(notif);
  });
  
  return Array.from(groups.values());
}

async function loadNotifications() {
  showLoader("Cargando solicitudes...");
  
  try {
    const res = await fetch(API + "?action=notifications");
    const data = await res.json();
    
    const container = document.getElementById("notifications");
    
    if (!data.notifications || data.notifications.length === 0) {
      container.innerHTML = '<div class="empty">📭 No hay solicitudes pendientes</div>';
      return;
    }
    
    // Solo mostrar notificaciones con STATUS "pending"
    const pendingNotifs = data.notifications.filter(n => n.STATUS === "pending");
    
    if (pendingNotifs.length === 0) {
      container.innerHTML = '<div class="empty">✅ No hay solicitudes pendientes</div>';
      return;
    }
    
    // Agrupar por REQUEST_ID
    const groups = groupNotificationsByRequest(pendingNotifs);
    
    container.innerHTML = "";
    
    for (const group of groups) {
      const requestDiv = document.createElement("div");
      requestDiv.className = "request-card";
      requestDiv.setAttribute("data-request-id", group.requestId);
      
      // Verificar stock de cada producto
      const stockStatus = await checkStockForGroup(group.notifications);
      
      // Calcular cantidad de productos con stock
      const availableProducts = group.notifications.filter((n, idx) => stockStatus[idx].hasStock);
      const unavailableProducts = group.notifications.filter((n, idx) => !stockStatus[idx].hasStock);
      
      requestDiv.innerHTML = `
        // Dentro del HTML de cada request, agregar:
<div class="request-header">
  <div>
    <strong>Solicitud:</strong> <span class="request-id">${escapeHtml(group.requestId)}</span>
  </div>
  <div class="request-date">
    📅 ${new Date(group.notifications[0].FECHA).toLocaleString()}
  </div>
  ${group.clientPhone ? `
  <div class="client-phone" style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px;">
    📱 Cliente: +52 ${group.clientPhone}
  </div>
  ` : ''}
</div>
        <div class="request-products">
          ${group.notifications.map((notif, idx) => {
            const status = stockStatus[idx];
            const isAvailable = status.hasStock;
            const currentStock = status.currentStock;
            
            return `
              <div class="request-product-item ${!isAvailable ? 'out-of-stock' : ''}">
                <img class="request-product-img" src="${escapeHtml(notif.IMAGEN || '')}" 
                     onerror="this.src='https://placehold.co/70x70/eee/999?text=No+img'">
                <div class="request-product-info">
                  <div class="request-product-name">${escapeHtml(notif.NOMBRE || 'Producto')}</div>
                  <div class="request-product-meta">
                    <span>ID: ${notif.PRODUCT_ID}</span>
                    <span>Cantidad: ${notif.CANTIDAD}</span>
                    ${!isAvailable ? `<span>📦 Stock actual: ${currentStock}</span>` : ''}
                  </div>
                </div>
                <div class="request-product-status ${isAvailable ? 'status-pending' : 'status-outofstock'}">
                  ${isAvailable ? '⏳ Pendiente' : '❌ Sin stock suficiente'}
                </div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="request-actions">
          ${unavailableProducts.length > 0 ? `
            <button class="btn btn-secondary" onclick="removeOutOfStockNotifications('${group.requestId}')">
              🗑️ Eliminar ${unavailableProducts.length} producto(s) sin stock
            </button>
          ` : ''}
          ${availableProducts.length > 0 ? `
            <button class="btn btn-confirm" onclick="confirmGroupPurchase('${group.requestId}')">
              ✅ Confirmar compra (${availableProducts.length} producto${availableProducts.length !== 1 ? 's' : ''})
            </button>
          ` : ''}
          <button class="btn btn-cancel" onclick="cancelGroupPurchase('${group.requestId}')">
            ❌ Cancelar toda la solicitud
          </button>
        </div>
      `;
      
      container.appendChild(requestDiv);
    }
    
  } catch (err) {
    console.error("Error:", err);
    document.getElementById("notifications").innerHTML = '<div class="empty">❌ Error cargando solicitudes</div>';
  } finally {
    hideLoader();
  }
}

async function checkStockForGroup(notifications) {
  const results = [];
  
  for (const notif of notifications) {
    try {
      const response = await fetch(API, {
        method: "POST",
        body: JSON.stringify({
          action: "checkStock",
          productId: Number(notif.PRODUCT_ID),
          cantidad: Number(notif.CANTIDAD)
        })
      });
      const data = await response.json();
      results.push({
        hasStock: data.ok === true,
        currentStock: data.currentStock || 0
      });
    } catch (err) {
      results.push({ hasStock: false, currentStock: 0 });
    }
  }
  
  return results;
}

async function confirmGroupPurchase(requestId) {
  if (!confirm(`¿Confirmar TODOS los productos con stock disponible de esta solicitud?\n\nLos productos sin stock serán rechazados automáticamente.`)) {
    return;
  }
  
  showLoader("Verificando stock y procesando...");
  
  try {
    const response = await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        action: "confirmGroupPurchase",
        requestId: requestId
      })
    });
    
    const data = await response.json();
    
    if (data.ok) {
      alert(`✅ ${data.message}\n💰 Total: $${(data.totalAmount || 0).toLocaleString()}`);
      
      if (data.paymentLink) {
        // Mostrar el link de pago
        const container = document.getElementById("notifications");
        const paymentDiv = document.createElement("div");
        paymentDiv.className = "payment-link-container";
        paymentDiv.innerHTML = `
          <strong>✅ Link de pago generado:</strong><br>
          <div class="payment-link">${data.paymentLink}</div>
          <div style="display: flex; gap: 8px; margin-top: 12px;">
            <button onclick="window.open('${data.paymentLink}', '_blank')" class="btn btn-confirm" style="flex:1;">
              💳 Abrir pago
            </button>
            <button onclick="navigator.clipboard.writeText('${data.paymentLink}')" class="btn btn-secondary" style="flex:1;">
              📋 Copiar
            </button>
          </div>
        `;
        
        const requestCard = document.querySelector(`.request-card[data-request-id="${requestId}"]`);
        if (requestCard) {
          requestCard.insertAdjacentElement('afterend', paymentDiv);
          setTimeout(() => paymentDiv.remove(), 15000);
        }
      }
      
      // Recargar notificaciones
      setTimeout(() => loadNotifications(), 1000);
    } else {
      throw new Error(data.error || "Error al confirmar");
    }
    
  } catch (err) {
    alert(`❌ Error: ${err.message}`);
  } finally {
    hideLoader();
  }
}

async function removeOutOfStockNotifications(requestId) {
  if (!confirm("¿Eliminar los productos sin stock de esta solicitud? Los productos con stock se mantendrán pendientes.")) {
    return;
  }
  
  showLoader("Eliminando productos sin stock...");
  
  try {
    const response = await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        action: "removeOutOfStockNotifications",
        requestId: requestId
      })
    });
    
    const data = await response.json();
    
    if (data.ok) {
      alert(`✅ Eliminados ${data.removedCount} producto(s) sin stock`);
      loadNotifications();
    } else {
      throw new Error(data.error || "Error");
    }
    
  } catch (err) {
    alert(`❌ Error: ${err.message}`);
  } finally {
    hideLoader();
  }
}


// Obtener número del cliente para cada grupo
async function getClientPhone(requestId) {
  try {
    const response = await fetch(API + "?action=getClientPhone&requestId=" + requestId);
    const data = await response.json();
    return data.ok ? data.phone : null;
  } catch {
    return null;
  }
}





  
async function cancelGroupPurchase(requestId) {
  if (!confirm("¿Cancelar TODA la solicitud de compra?")) {
    return;
  }
  
  showLoader("Cancelando solicitud...");
  
  try {
    const response = await fetch(API, {
      method: "POST",
      body: JSON.stringify({
        action: "cancelGroupPurchase",
        requestId: requestId
      })
    });
    
    const data = await response.json();
    
    if (data.ok) {
      alert(`✅ Solicitud cancelada (${data.cancelledCount} productos)`);
      loadNotifications();
    } else {
      throw new Error(data.error || "Error");
    }
    
  } catch (err) {
    alert(`❌ Error: ${err.message}`);
  } finally {
    hideLoader();
  }
}

// Auto-refresh cada 10 segundos
let refreshInterval;

function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    if (document.visibilityState === "visible") {
      loadNotifications();
    }
  }, 100000);
}

document.addEventListener("DOMContentLoaded", () => {
  loadNotifications();
  startAutoRefresh();
});

window.addEventListener("beforeunload", () => {
  if (refreshInterval) clearInterval(refreshInterval);
});
</script>

</body>
</html>
